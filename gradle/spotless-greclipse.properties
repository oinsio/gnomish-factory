# Groovy-Eclipse (greclipse) formatter preferences for the Spotless groovy
# block (FR8 of add-project-skeleton, design D7). Kept minimal: 4-space
# indentation matching .editorconfig; everything else uses greclipse defaults.
org.eclipse.jdt.core.formatter.tabulation.char=space
org.eclipse.jdt.core.formatter.tabulation.size=4
org.eclipse.jdt.core.formatter.indentation.size=4
groovy.formatter.remove.unnecessary.semicolons=true
