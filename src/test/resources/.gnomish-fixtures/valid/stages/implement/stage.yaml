purpose: implement the plan and produce a diff
inputs:
  - kind: internal
    producerOutputId: plan-doc
  - kind: source
outputs:
  - id: impl-diff
executor:
  type: agent-cli
  model: implement-model
  settings:
    maxTurns: 40
    allowedTools:
      - read
      - edit
    disallowedTools:
      - bash
    roundTimeout: 900
instructions: stages/implement/instructions.md
verify:
  - type: builtin
    name: files_exist
    params:
      paths:
        - src
  - type: command
    command: ./gradlew test
  - type: external
    checkId: ci/build
    interval: 30s
    timeout: 5m
  - type: judge
    criteriaFile: stages/implement/acceptance.md
    model: judge-model
    settings:
      maxTurns: 3
    votes: 3
advancement: manual
