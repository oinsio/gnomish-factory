# CI quality gate: runs `./gradlew check` (Spock + JaCoCo + PIT + Spotless +
# static analysis) on every push and pull request.
# Implements FR7, NFR-O1, NFR-C1, NFR-S2 of add-project-skeleton (design D6/D7).
#
# Action versions are pinned by major tag; Dependabot (`.github/dependabot.yml`)
# keeps them fresh. Design D7 mandates least-privilege permissions, concurrency
# cancellation, and wrapper validation — not SHA pinning.
name: CI

# Trigger pattern: run on every push (FR7); the pull_request event is used only
# for PRs from forks (which get no push events in this repo). Same-repo PR
# branches are already covered by their push runs, so the job-level `if` below
# skips the duplicate pull_request run (NFR-C1: no double builds per commit).
on:
  push:
  pull_request:

# Least-privilege token: the build only reads the repo contents (NFR-S2).
permissions:
  contents: read

# Cancel superseded in-flight runs for the same ref (NFR-C1).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Skip pull_request runs for same-repo branches — the push run covers them.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10 # NFR-C1: CI completes within 10 minutes

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history (not the default shallow clone) so the merge base
          # with main is reachable for the diff-base resolution below
          # (scope-pit-to-changed-files FR2/FR3, design D3).
          fetch-depth: 0

      # The git-mode test suite exercises real `git commit` calls through the
      # production adapters (GitTaskRepository, GitAttemptPersistence, ...),
      # which rely on an ambient git identity same as a real deployment would.
      # The runner has none by default, so every such commit fails with
      # "Author identity unknown" — set one scoped to this job.
      - name: Configure git identity for test-suite commits
        run: |
          git config --global user.email "ci@gnomish-factory.invalid"
          git config --global user.name "gnomish-factory CI"

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Validate gradle-wrapper.jar against known checksums (NFR-S2).
          # On by default in v6; kept explicit as a documented security gate.
          validate-wrappers: true

      # Resolves the diff base used to scope PIT to changed production classes
      # (scope-pit-to-changed-files FR2/FR3, design D3). Push runs diff against
      # the merge base with origin/main, so only what the branch adds on top of
      # main is scoped; fork pull_request runs use the event's own base SHA
      # instead (no local merge-base resolution needed, GitHub supplies it).
      # Fails loudly if the base cannot be resolved rather than silently
      # falling back to an empty diff (design D3 risk mitigation: a
      # shallow/detached checkout must be a hard error, not a masked no-op).
      - name: Resolve diff base
        id: diff-base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            if [ -z "$base" ]; then
              echo "::error::pull_request base SHA is empty in the event payload" >&2
              exit 1
            fi
            if ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
              echo "::error::pull_request base SHA ${base} is not present locally" >&2
              exit 1
            fi
          else
            if ! git rev-parse --verify --quiet origin/main >/dev/null; then
              echo "::error::origin/main does not resolve; cannot compute the diff base" >&2
              exit 1
            fi
            if ! base="$(git merge-base origin/main HEAD)"; then
              echo "::error::git merge-base origin/main HEAD failed" >&2
              exit 1
            fi
          fi
          echo "base=${base}" >> "$GITHUB_OUTPUT"

      # Derives the changed-class list from the diff base and narrows the PIT
      # run to those classes (scope-pit-to-changed-files FR2/FR3, design D2).
      # --diff-filter=d drops deletions (a deleted class cannot be mutated); a
      # rename shows as delete+add, so only the added path survives, which is
      # correct. Each surviving src/main/java/**/*.java path is stripped of its
      # prefix/suffix and '/' -> '.' mapped to a fully-qualified class name used
      # verbatim as a PIT glob. No production Java changes -> empty string,
      # which is the empty-scope case build.gradle's pitScope skip handles
      # (FR4, design D4).
      - name: Compute changed production classes
        id: changed-classes
        run: |
          classes="$(git diff --diff-filter=d --name-only "${{ steps.diff-base.outputs.base }}...HEAD" -- 'src/main/java/**/*.java' \
            | sed -e 's#^src/main/java/##' -e 's#\.java$##' -e 's#/#.#g' \
            | paste -sd ',' -)"
          echo "classes=${classes}" >> "$GITHUB_OUTPUT"

      # -PpitScope narrows PIT's targetClasses to the changed-class list; when
      # the list is empty this passes -PpitScope="" which is exactly the
      # set-but-empty case build.gradle's onlyIf skips cleanly (no "No
      # mutations found" failure). PIT stays part of the single `check`
      # lifecycle (scope-pit-to-changed-files FR2-FR4, NFR-C1).
      - name: Run quality gates
        run: ./gradlew check "-PpitScope=${{ steps.changed-classes.outputs.classes }}"

      # Reports are uploaded even when the build fails — a red gate is exactly
      # when the HTML/XML reports are needed (NFR-O1). 14-day retention keeps
      # storage cost bounded (NFR-C1).
      - name: Upload JaCoCo report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/
          retention-days: 14

      - name: Upload PIT report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: pit-report
          path: build/reports/pitest/
          retention-days: 14
